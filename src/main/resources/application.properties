# =========================================
# Async Thread Pool for WhatsApp Dispatch
# =========================================
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=15
spring.task.execution.pool.queue-capacity=200
spring.task.execution.thread-name-prefix=wa-async-


# =========================================
# Flyway Configuration (Facebook Publishing module)
# Existing schema was created by hibernate.ddl-auto=update, so Flyway is
# baselined at V1 (i.e. "everything up to here already exists, don't touch it").
# New migrations (V2+) only create the new social-post tables below.
# =========================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=baseline_existing_schema
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false



